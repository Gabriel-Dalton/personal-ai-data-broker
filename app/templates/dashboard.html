{% extends "base.html" %}
{% block title %}Dashboard — Personal AI Data Broker{% endblock %}
{% block body %}
<div class="min-h-full flex" x-data="app()" x-cloak>
    <!-- Sidebar -->
    <aside class="hidden lg:flex lg:flex-col w-64 bg-white border-r border-gray-200">
        <div class="p-6">
            <h1 class="text-lg font-bold text-brand-700 tracking-tight">AI Data Broker</h1>
            <p class="text-xs text-gray-400 mt-1">Personal control panel</p>
        </div>
        <nav class="flex-1 px-3 space-y-1">
            <template x-for="tab in tabs" :key="tab.id">
                <button
                    @click="currentTab = tab.id"
                    :class="currentTab === tab.id ? 'bg-brand-50 text-brand-700' : 'text-gray-600 hover:bg-gray-50'"
                    class="w-full flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors"
                >
                    <span x-html="tab.icon" class="h-5 w-5 shrink-0"></span>
                    <span x-text="tab.label"></span>
                </button>
            </template>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <template x-if="token">
                <button @click="logout()" class="w-full text-sm text-gray-500 hover:text-red-600 transition-colors">Sign out</button>
            </template>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto">
        <!-- Mobile header -->
        <div class="lg:hidden sticky top-0 z-10 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
            <h1 class="text-lg font-bold text-brand-700">AI Data Broker</h1>
            <select x-model="currentTab" class="rounded-lg border-gray-300 text-sm">
                <template x-for="tab in tabs" :key="tab.id">
                    <option :value="tab.id" x-text="tab.label"></option>
                </template>
            </select>
        </div>

        <!-- Login gate -->
        <template x-if="!token">
            <div class="flex items-center justify-center min-h-[80vh] p-6">
                <div class="w-full max-w-sm">
                    <div class="bg-white rounded-2xl shadow-sm ring-1 ring-gray-100 p-8">
                        <h2 class="text-2xl font-bold text-gray-900 text-center">Sign In</h2>
                        <p class="mt-2 text-sm text-gray-500 text-center">Default: admin / changeme</p>
                        <div class="mt-6 space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                                <input x-model="loginForm.username" type="text" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm px-3 py-2 border" placeholder="admin">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input x-model="loginForm.password" type="password" @keyup.enter="login()" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm px-3 py-2 border" placeholder="changeme">
                            </div>
                            <p x-show="loginError" x-text="loginError" class="text-sm text-red-600"></p>
                            <button @click="login()" class="w-full rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-700 transition-colors">
                                Sign In
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Authenticated content -->
        <template x-if="token">
            <div class="p-6 lg:p-10 max-w-5xl mx-auto fade-in">
                <!-- Data Vault -->
                <div x-show="currentTab === 'data'" x-transition>
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-900">Data Vault</h2>
                            <p class="text-sm text-gray-500 mt-1">Your personal data entries</p>
                        </div>
                        <button @click="showDataForm = !showDataForm" class="inline-flex items-center gap-2 rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-700 transition-colors">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            Add Entry
                        </button>
                    </div>

                    <!-- New entry form -->
                    <div x-show="showDataForm" x-transition class="bg-white rounded-xl ring-1 ring-gray-100 shadow-sm p-6 mb-6">
                        <h3 class="font-semibold text-gray-900 mb-4">New Data Entry</h3>
                        <div class="grid sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                                <input x-model="dataForm.category" type="text" class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border" placeholder="contacts, health, finance...">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Label</label>
                                <input x-model="dataForm.label" type="text" class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border" placeholder="Work email">
                            </div>
                            <div class="sm:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Content</label>
                                <textarea x-model="dataForm.content" rows="3" class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border" placeholder="The actual data value..."></textarea>
                            </div>
                            <div class="flex items-center gap-2">
                                <input x-model="dataForm.is_sensitive" type="checkbox" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                                <label class="text-sm text-gray-700">Mark as sensitive</label>
                            </div>
                        </div>
                        <div class="mt-4 flex gap-3">
                            <button @click="createData()" class="rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-700 transition-colors">Save</button>
                            <button @click="showDataForm = false" class="rounded-lg bg-gray-100 px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-200 transition-colors">Cancel</button>
                        </div>
                    </div>

                    <!-- Entries list -->
                    <div class="space-y-3">
                        <template x-if="dataEntries.length === 0">
                            <div class="bg-white rounded-xl ring-1 ring-gray-100 p-12 text-center">
                                <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
                                <p class="mt-4 text-sm text-gray-500">No data entries yet. Click "Add Entry" to get started.</p>
                            </div>
                        </template>
                        <template x-for="entry in dataEntries" :key="entry.id">
                            <div class="bg-white rounded-xl ring-1 ring-gray-100 shadow-sm p-5 flex items-start justify-between gap-4 hover:shadow-md transition-shadow">
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="inline-flex items-center rounded-md bg-brand-50 px-2 py-0.5 text-xs font-medium text-brand-700 ring-1 ring-brand-200" x-text="entry.category"></span>
                                        <span x-show="entry.is_sensitive" class="inline-flex items-center rounded-md bg-red-50 px-2 py-0.5 text-xs font-medium text-red-700 ring-1 ring-red-200">sensitive</span>
                                    </div>
                                    <h4 class="font-medium text-gray-900" x-text="entry.label"></h4>
                                    <p class="text-sm text-gray-500 mt-1 truncate" x-text="entry.content"></p>
                                </div>
                                <button @click="deleteData(entry.id)" class="shrink-0 rounded-lg p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors">
                                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Policies -->
                <div x-show="currentTab === 'policies'" x-transition>
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-900">Access Policies</h2>
                            <p class="text-sm text-gray-500 mt-1">Control what AI services can access</p>
                        </div>
                        <button @click="showPolicyForm = !showPolicyForm" class="inline-flex items-center gap-2 rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-700 transition-colors">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            New Policy
                        </button>
                    </div>

                    <div x-show="showPolicyForm" x-transition class="bg-white rounded-xl ring-1 ring-gray-100 shadow-sm p-6 mb-6">
                        <h3 class="font-semibold text-gray-900 mb-4">New Access Policy</h3>
                        <div class="grid sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Policy Name</label>
                                <input x-model="policyForm.name" type="text" class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border" placeholder="ChatGPT - Read contacts">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Allowed Categories</label>
                                <input x-model="policyForm.allowed_categories" type="text" class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border" placeholder="* (all) or contacts,calendar">
                            </div>
                            <div class="sm:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                                <input x-model="policyForm.description" type="text" class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border" placeholder="Optional description...">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Max Requests/Hour</label>
                                <input x-model.number="policyForm.max_requests_per_hour" type="number" min="1" max="10000" class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border">
                            </div>
                            <div class="flex items-center gap-2 self-end pb-2">
                                <input x-model="policyForm.allow_sensitive" type="checkbox" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                                <label class="text-sm text-gray-700">Allow sensitive data</label>
                            </div>
                        </div>
                        <div class="mt-4 flex gap-3">
                            <button @click="createPolicy()" class="rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-700 transition-colors">Create</button>
                            <button @click="showPolicyForm = false" class="rounded-lg bg-gray-100 px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-200 transition-colors">Cancel</button>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <template x-if="policies.length === 0">
                            <div class="bg-white rounded-xl ring-1 ring-gray-100 p-12 text-center">
                                <p class="text-sm text-gray-500">No policies yet. Create one to start issuing API keys.</p>
                            </div>
                        </template>
                        <template x-for="p in policies" :key="p.id">
                            <div class="bg-white rounded-xl ring-1 ring-gray-100 shadow-sm p-5 hover:shadow-md transition-shadow">
                                <div class="flex items-start justify-between gap-4">
                                    <div>
                                        <div class="flex items-center gap-2">
                                            <h4 class="font-medium text-gray-900" x-text="p.name"></h4>
                                            <span :class="p.is_active ? 'bg-green-50 text-green-700 ring-green-200' : 'bg-gray-50 text-gray-500 ring-gray-200'" class="inline-flex items-center rounded-md px-2 py-0.5 text-xs font-medium ring-1" x-text="p.is_active ? 'Active' : 'Disabled'"></span>
                                        </div>
                                        <p class="text-sm text-gray-500 mt-1" x-text="p.description || 'No description'"></p>
                                    </div>
                                    <button @click="deletePolicy(p.id)" class="shrink-0 rounded-lg p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors">
                                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                    </button>
                                </div>
                                <div class="mt-3 flex flex-wrap gap-3 text-xs text-gray-500">
                                    <span>Categories: <strong class="text-gray-700" x-text="p.allowed_categories"></strong></span>
                                    <span>Sensitive: <strong class="text-gray-700" x-text="p.allow_sensitive ? 'Yes' : 'No'"></strong></span>
                                    <span>Rate limit: <strong class="text-gray-700" x-text="p.max_requests_per_hour + '/hr'"></strong></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- API Keys -->
                <div x-show="currentTab === 'keys'" x-transition>
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-900">API Keys</h2>
                            <p class="text-sm text-gray-500 mt-1">Keys for AI services to authenticate</p>
                        </div>
                        <button @click="showKeyForm = !showKeyForm" class="inline-flex items-center gap-2 rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-700 transition-colors">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            New Key
                        </button>
                    </div>

                    <div x-show="showKeyForm" x-transition class="bg-white rounded-xl ring-1 ring-gray-100 shadow-sm p-6 mb-6">
                        <h3 class="font-semibold text-gray-900 mb-4">Issue New API Key</h3>
                        <div class="grid sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Policy</label>
                                <select x-model.number="keyForm.policy_id" class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border">
                                    <option value="">Select a policy...</option>
                                    <template x-for="p in policies" :key="p.id">
                                        <option :value="p.id" x-text="p.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Label</label>
                                <input x-model="keyForm.label" type="text" class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border" placeholder="My ChatGPT plugin">
                            </div>
                        </div>
                        <div class="mt-4 flex gap-3">
                            <button @click="createKey()" class="rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-700 transition-colors">Generate Key</button>
                            <button @click="showKeyForm = false" class="rounded-lg bg-gray-100 px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-200 transition-colors">Cancel</button>
                        </div>
                    </div>

                    <!-- Show newly created key -->
                    <div x-show="newKeyValue" x-transition class="bg-green-50 rounded-xl ring-1 ring-green-200 p-5 mb-6">
                        <p class="text-sm font-medium text-green-800 mb-2">New API key created! Copy it now &mdash; it won't be shown again.</p>
                        <code class="block bg-white rounded-lg px-4 py-3 text-sm font-mono text-gray-900 break-all ring-1 ring-green-200" x-text="newKeyValue"></code>
                        <button @click="navigator.clipboard.writeText(newKeyValue); newKeyValue = ''" class="mt-3 rounded-lg bg-green-600 px-4 py-2 text-sm font-semibold text-white hover:bg-green-700 transition-colors">Copy & Dismiss</button>
                    </div>

                    <div class="space-y-3">
                        <template x-if="apiKeys.length === 0">
                            <div class="bg-white rounded-xl ring-1 ring-gray-100 p-12 text-center">
                                <p class="text-sm text-gray-500">No API keys yet. Create a policy first, then generate a key.</p>
                            </div>
                        </template>
                        <template x-for="k in apiKeys" :key="k.id">
                            <div class="bg-white rounded-xl ring-1 ring-gray-100 shadow-sm p-5 flex items-center justify-between gap-4 hover:shadow-md transition-shadow">
                                <div class="min-w-0">
                                    <div class="flex items-center gap-2 mb-1">
                                        <h4 class="font-medium text-gray-900" x-text="k.label"></h4>
                                        <span :class="k.is_active ? 'bg-green-50 text-green-700 ring-green-200' : 'bg-red-50 text-red-700 ring-red-200'" class="inline-flex items-center rounded-md px-2 py-0.5 text-xs font-medium ring-1" x-text="k.is_active ? 'Active' : 'Revoked'"></span>
                                    </div>
                                    <p class="text-sm text-gray-500 font-mono" x-text="k.key_prefix"></p>
                                    <p class="text-xs text-gray-400 mt-1" x-text="'Last used: ' + (k.last_used_at || 'Never')"></p>
                                </div>
                                <div class="flex gap-2">
                                    <button @click="toggleKey(k.id)" :class="k.is_active ? 'hover:bg-yellow-50 hover:text-yellow-600' : 'hover:bg-green-50 hover:text-green-600'" class="rounded-lg p-2 text-gray-400 transition-colors" :title="k.is_active ? 'Revoke' : 'Reactivate'">
                                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Audit Log -->
                <div x-show="currentTab === 'audit'" x-transition>
                    <div class="mb-6">
                        <h2 class="text-2xl font-bold text-gray-900">Audit Log</h2>
                        <p class="text-sm text-gray-500 mt-1">Every data access attempt is recorded</p>
                    </div>
                    <div class="bg-white rounded-xl ring-1 ring-gray-100 shadow-sm overflow-hidden">
                        <template x-if="auditLogs.length === 0">
                            <div class="p-12 text-center">
                                <p class="text-sm text-gray-500">No audit events yet. Events appear when AI services use the broker API.</p>
                            </div>
                        </template>
                        <template x-if="auditLogs.length > 0">
                            <div class="overflow-x-auto">
                                <table class="min-w-full divide-y divide-gray-200">
                                    <thead class="bg-gray-50">
                                        <tr>
                                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Time</th>
                                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Action</th>
                                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Detail</th>
                                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">IP</th>
                                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Allowed</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                                        <template x-for="log in auditLogs" :key="log.id">
                                            <tr class="hover:bg-gray-50">
                                                <td class="px-4 py-3 text-sm text-gray-500 whitespace-nowrap" x-text="new Date(log.created_at).toLocaleString()"></td>
                                                <td class="px-4 py-3 text-sm font-medium text-gray-900" x-text="log.action"></td>
                                                <td class="px-4 py-3 text-sm text-gray-500 max-w-xs truncate" x-text="log.detail"></td>
                                                <td class="px-4 py-3 text-sm text-gray-500 font-mono" x-text="log.ip_address || '—'"></td>
                                                <td class="px-4 py-3">
                                                    <span :class="log.allowed ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'" class="inline-flex items-center rounded-md px-2 py-0.5 text-xs font-medium" x-text="log.allowed ? 'Yes' : 'Denied'"></span>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </main>
</div>

<script>
function app() {
    return {
        token: localStorage.getItem('pdb_token') || '',
        currentTab: 'data',
        tabs: [
            { id: 'data',     label: 'Data Vault',      icon: '<svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg>' },
            { id: 'policies', label: 'Access Policies',  icon: '<svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>' },
            { id: 'keys',     label: 'API Keys',         icon: '<svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>' },
            { id: 'audit',    label: 'Audit Log',        icon: '<svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>' },
        ],

        loginForm: { username: 'admin', password: 'changeme' },
        loginError: '',

        dataEntries: [],
        showDataForm: false,
        dataForm: { category: '', label: '', content: '', is_sensitive: false },

        policies: [],
        showPolicyForm: false,
        policyForm: { name: '', description: '', allowed_categories: '*', allow_sensitive: false, max_requests_per_hour: 60 },

        apiKeys: [],
        showKeyForm: false,
        keyForm: { policy_id: '', label: '' },
        newKeyValue: '',

        auditLogs: [],

        async init() {
            if (this.token) await this.loadAll();
        },

        headers() {
            return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token}` };
        },

        async login() {
            this.loginError = '';
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.loginForm),
                });
                if (!res.ok) { this.loginError = 'Invalid credentials'; return; }
                const data = await res.json();
                this.token = data.access_token;
                localStorage.setItem('pdb_token', this.token);
                await this.loadAll();
            } catch { this.loginError = 'Connection error'; }
        },

        logout() {
            this.token = '';
            localStorage.removeItem('pdb_token');
            this.dataEntries = []; this.policies = []; this.apiKeys = []; this.auditLogs = [];
        },

        async loadAll() {
            await Promise.all([this.loadData(), this.loadPolicies(), this.loadKeys(), this.loadAudit()]);
        },

        async api(url, opts = {}) {
            const res = await fetch(url, { ...opts, headers: this.headers() });
            if (res.status === 401) { this.logout(); return null; }
            return res;
        },

        async loadData() {
            const res = await this.api('/api/data');
            if (res?.ok) this.dataEntries = await res.json();
        },

        async createData() {
            const res = await this.api('/api/data', { method: 'POST', body: JSON.stringify(this.dataForm) });
            if (res?.ok) {
                this.dataForm = { category: '', label: '', content: '', is_sensitive: false };
                this.showDataForm = false;
                await this.loadData();
            }
        },

        async deleteData(id) {
            await this.api(`/api/data/${id}`, { method: 'DELETE' });
            await this.loadData();
        },

        async loadPolicies() {
            const res = await this.api('/api/policies');
            if (res?.ok) this.policies = await res.json();
        },

        async createPolicy() {
            const res = await this.api('/api/policies', { method: 'POST', body: JSON.stringify(this.policyForm) });
            if (res?.ok) {
                this.policyForm = { name: '', description: '', allowed_categories: '*', allow_sensitive: false, max_requests_per_hour: 60 };
                this.showPolicyForm = false;
                await this.loadPolicies();
            }
        },

        async deletePolicy(id) {
            await this.api(`/api/policies/${id}`, { method: 'DELETE' });
            await this.loadPolicies();
        },

        async loadKeys() {
            const res = await this.api('/api/keys');
            if (res?.ok) this.apiKeys = await res.json();
        },

        async createKey() {
            const res = await this.api('/api/keys', { method: 'POST', body: JSON.stringify(this.keyForm) });
            if (res?.ok) {
                const data = await res.json();
                this.newKeyValue = data.key;
                this.keyForm = { policy_id: '', label: '' };
                this.showKeyForm = false;
                await this.loadKeys();
            }
        },

        async toggleKey(id) {
            await this.api(`/api/keys/${id}/toggle`, { method: 'POST' });
            await this.loadKeys();
        },

        async loadAudit() {
            const res = await this.api('/api/audit');
            if (res?.ok) this.auditLogs = await res.json();
        },
    };
}
</script>
{% endblock %}
